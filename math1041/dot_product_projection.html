<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dot Product & Projection - Math 1041</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --background: 240 10% 3.9%;
            --foreground: 0 0% 98%;
            --border: 240 3.7% 15.9%;
            --radius: 0.5rem;
        }
        body { background-color: hsl(var(--background)); color: hsl(var(--foreground)); font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; overflow: hidden; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        #ui-layer > * { pointer-events: auto; }
        .stat-card { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(8px); border: 1px solid hsl(var(--border)); border-radius: var(--radius); padding: 1rem; width: fit-content; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="canvas-container" class="absolute inset-0 w-full h-full"></div>
    <div id="ui-layer">
        <div class="stat-card">
            <h2 class="text-sm font-semibold mb-2 opacity-70">DOT PRODUCT & PROJECTION</h2>
            <p class="text-xs text-blue-400 font-mono mb-4 italic italic">Prediction Prompt: If A is perpendicular to B, what will the projection length be?</p>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase tracking-wider opacity-50 block mb-1">Vector A (Blue)</label>
                    <input type="range" id="ax" min="-5" max="5" step="0.1" value="3" class="w-full">
                </div>
                <div>
                    <label class="text-[10px] uppercase tracking-wider opacity-50 block mb-1">Angle θ (Degrees)</label>
                    <input type="range" id="theta" min="0" max="360" step="1" value="45" class="w-full">
                </div>
                <div class="pt-2 border-t border-white/10 space-y-1">
                    <p class="text-xs font-mono">A · B: <span id="dot-val" class="text-yellow-400">---</span></p>
                    <p class="text-xs font-mono text-purple-400">Proj_B A: <span id="proj-val">---</span></p>
                </div>
            </div>
        </div>
    </div>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x09090b);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        scene.add(new THREE.GridHelper(20, 20, 0x27272a, 0x18181b));

        const arrowA = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(0,0,0), 1, 0x3b82f6);
        const arrowB = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(0,0,0), 5, 0x71717a);
        const arrowP = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(0,0,0), 1, 0xa855f7);
        scene.add(arrowA, arrowB, arrowP);

        const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const dropLine = new THREE.Line(lineGeo, new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 0.1, gapSize: 0.1 }));
        scene.add(dropLine);

        function update() {
            const magA = parseFloat(document.getElementById('ax').value);
            const deg = parseFloat(document.getElementById('theta').value);
            const rad = deg * Math.PI / 180;

            const vA = new THREE.Vector3(magA * Math.cos(rad), magA * Math.sin(rad), 0);
            const vB = new THREE.Vector3(5, 0, 0); // Static B for simplicity of projection visual

            arrowA.setDirection(vA.clone().normalize());
            arrowA.setLength(Math.abs(magA) || 0.001);

            const dot = vA.dot(vB.clone().normalize()); // Dot with unit B gives projection length
            const vP = new THREE.Vector3(dot, 0, 0);
            
            arrowP.setDirection(vP.clone().normalize());
            arrowP.setLength(Math.abs(dot) || 0.001);
            arrowP.position.set(0, -0.1, 0); // Slight offset for visibility

            dropLine.geometry.setFromPoints([vA, new THREE.Vector3(dot, 0, 0)]);
            dropLine.computeLineDistances();

            document.getElementById('dot-val').innerText = (vA.dot(vB)).toFixed(2);
            document.getElementById('proj-val').innerText = dot.toFixed(2);
        }

        document.getElementById('ax').addEventListener('input', update);
        document.getElementById('theta').addEventListener('input', update);
        update();

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
