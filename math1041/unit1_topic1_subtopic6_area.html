<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallelogram Area</title>
<style>
:root {
  --notion-bg-main: #FFFFFF;    --notion-bg-sidebar: #F7F7F5;
  --notion-hover-sidebar: #EFEFEE; --notion-hover-main: #F1F1EF;
  --notion-text-primary: #37352F;  --notion-text-secondary: #787774;
  --notion-text-placeholder: #9A9A97; --notion-border: #E9E9E7;
}
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: var(--notion-bg-main); color: var(--notion-text-primary); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.container { width: 100%; max-width: 600px; padding: 20px; border: 1px solid var(--notion-border); border-radius: 8px; background: var(--notion-bg-sidebar); }
.prediction { background: var(--notion-hover-main); padding: 12px; border-radius: 4px; border-left: 4px solid var(--notion-text-placeholder); margin-bottom: 20px; font-size: 14px; }
canvas { background: var(--notion-bg-main); border: 1px solid var(--notion-border); border-radius: 4px; width: 100%; cursor: crosshair; display: block; }
.info { margin-top: 15px; padding: 15px; background: var(--notion-bg-main); border-radius: 4px; border: 1px solid var(--notion-border); font-family: monospace; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <div class="prediction">
    <strong>Prediction Prompt:</strong> A parallelogram's area is ||A × B||. What happens to the area if you "shear" the shape by dragging Vector B along a line parallel to Vector A?
  </div>
  <canvas id="simCanvas" width="560" height="400"></canvas>
  <div class="info" id="infoBox">Loading...</div>
</div>
<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
let width = canvas.width; let height = canvas.height;
let dpr = window.devicePixelRatio || 1;
canvas.width = width * dpr; canvas.height = height * dpr;
ctx.scale(dpr, dpr);

const origin = { x: width/4, y: height/2 + 50 };
let A = { x: 150, y: -20 };
let B = { x: 60, y: -120 };
let dragging = null;

function drawGrid() {
    ctx.clearRect(0, 0, width, height);
    ctx.strokeStyle = 'var(--notion-border)'; ctx.lineWidth = 1;
    for(let i=0; i<width; i+=20) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,height); ctx.stroke(); }
    for(let i=0; i<height; i+=20) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(width,i); ctx.stroke(); }
    ctx.strokeStyle = 'var(--notion-text-placeholder)';
    ctx.beginPath(); ctx.moveTo(origin.x, 0); ctx.lineTo(origin.x, height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, origin.y); ctx.lineTo(width, origin.y); ctx.stroke();
}

function drawArrow(toX, toY, color, label) {
    let endX = origin.x + toX, endY = origin.y + toY;
    ctx.beginPath(); ctx.moveTo(origin.x, origin.y); ctx.lineTo(endX, endY);
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
    
    let angle = Math.atan2(toY, toX);
    ctx.beginPath(); ctx.moveTo(endX, endY);
    ctx.lineTo(endX - 10 * Math.cos(angle - Math.PI / 6), endY - 10 * Math.sin(angle - Math.PI / 6));
    ctx.lineTo(endX - 10 * Math.cos(angle + Math.PI / 6), endY - 10 * Math.sin(angle + Math.PI / 6));
    ctx.lineTo(endX, endY); ctx.fillStyle = color; ctx.fill();

    ctx.font = 'bold 14px Arial'; ctx.fillText(label, endX + 10, endY + 10);
}

function render() {
    drawGrid();
    
    // Draw Parallelogram
    let prA = {x: origin.x + A.x, y: origin.y + A.y};
    let prB = {x: origin.x + B.x, y: origin.y + B.y};
    let prC = {x: origin.x + A.x + B.x, y: origin.y + A.y + B.y};
    
    ctx.beginPath();
    ctx.moveTo(origin.x, origin.y);
    ctx.lineTo(prA.x, prA.y);
    ctx.lineTo(prC.x, prC.y);
    ctx.lineTo(prB.x, prB.y);
    ctx.fillStyle = 'rgba(237, 137, 54, 0.2)'; // orange trans
    ctx.fill();
    ctx.strokeStyle = '#ed8936'; ctx.setLineDash([5,5]); ctx.stroke(); ctx.setLineDash([]);
    
    drawArrow(A.x, A.y, '#3182ce', 'A');
    drawArrow(B.x, B.y, '#e53e3e', 'B');
    
    // Handles
    ctx.fillStyle = '#3182ce'; ctx.beginPath(); ctx.arc(origin.x+A.x, origin.y+A.y, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e53e3e'; ctx.beginPath(); ctx.arc(origin.x+B.x, origin.y+B.y, 6, 0, Math.PI*2); ctx.fill();
    
    let crossZ = Math.abs((A.x/20)*(B.y/20) - (A.y/20)*(B.x/20));
    
    document.getElementById('infoBox').innerHTML = 
        `Vector A = (${(A.x/20).toFixed(1)}, ${(-A.y/20).toFixed(1)})<br>` +
        `Vector B = (${(B.x/20).toFixed(1)}, ${(-B.y/20).toFixed(1)})<br>` +
        `<strong>Area = ||A × B|| = ${crossZ.toFixed(2)} square units</strong>`;
}

canvas.addEventListener('mousedown', e => {
    let rect = canvas.getBoundingClientRect();
    let mx = (e.clientX - rect.left) * (canvas.width / rect.width / dpr) - origin.x;
    let my = (e.clientY - rect.top) * (canvas.height / rect.height / dpr) - origin.y;
    if (Math.hypot(mx - A.x, my - A.y) < 20) dragging = 'A';
    else if (Math.hypot(mx - B.x, my - B.y) < 20) dragging = 'B';
});
canvas.addEventListener('mousemove', e => {
    if(!dragging) return;
    let rect = canvas.getBoundingClientRect();
    let mx = (e.clientX - rect.left) * (canvas.width / rect.width / dpr) - origin.x;
    let my = (e.clientY - rect.top) * (canvas.height / rect.height / dpr) - origin.y;
    if(dragging === 'A') { A.x = mx; A.y = my; }
    else if(dragging === 'B') { B.x = mx; B.y = my; }
    render();
});
canvas.addEventListener('mouseup', () => dragging = null);
canvas.addEventListener('mouseleave', () => dragging = null);
render();
</script>
</body>
</html>
