<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Vector Addition - Math 1041</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --background: 240 10% 3.9%;
            --foreground: 0 0% 98%;
            --card: 240 10% 3.9%;
            --card-foreground: 0 0% 98%;
            --primary: 0 0% 98%;
            --primary-foreground: 240 5.9% 10%;
            --border: 240 3.7% 15.9%;
            --radius: 0.5rem;
        }
        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            font-family: ui-sans-serif, system-ui, sans-serif;
            margin: 0;
            overflow: hidden;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        #ui-layer > * {
            pointer-events: auto;
        }
        .stat-card {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid hsl(var(--border));
            border-radius: var(--radius);
            padding: 1rem;
            width: fit-content;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container" class="absolute inset-0 w-full h-full"></div>

    <div id="ui-layer">
        <div class="stat-card">
            <h2 class="text-sm font-semibold mb-2 opacity-70">3D VECTOR ADDITION</h2>
            <p class="text-xs text-blue-400 font-mono mb-4 italic">Before moving sliders: Prediction Prompt: What happens to the magnitude of A+B if the angle between A and B increases?</p>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase tracking-wider opacity-50 block mb-1">Vector A (Blue)</label>
                    <div class="flex gap-2">
                        <input type="range" id="ax" min="-5" max="5" step="0.1" value="2" class="w-24">
                        <input type="range" id="ay" min="-5" max="5" step="0.1" value="1" class="w-24">
                        <input type="range" id="az" min="-5" max="5" step="0.1" value="0" class="w-24">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] uppercase tracking-wider opacity-50 block mb-1">Vector B (Red)</label>
                    <div class="flex gap-2">
                        <input type="range" id="bx" min="-5" max="5" step="0.1" value="1" class="w-24">
                        <input type="range" id="by" min="-5" max="5" step="0.1" value="3" class="w-24">
                        <input type="range" id="bz" min="-5" max="5" step="0.1" value="1" class="w-24">
                    </div>
                </div>
                <div class="pt-2 border-t border-white/10">
                    <p class="text-xs font-mono">Resultant |A+B|: <span id="mag-result" class="text-green-400">---</span></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x09090b);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const grid = new THREE.GridHelper(20, 20, 0x27272a, 0x18181b);
        scene.add(grid);
        const axes = new THREE.AxesHelper(10);
        scene.add(axes);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        let vA = new THREE.Vector3(2, 1, 0);
        let vB = new THREE.Vector3(1, 3, 1);

        const arrowA = new THREE.ArrowHelper(vA.clone().normalize(), new THREE.Vector3(0,0,0), vA.length(), 0x3b82f6);
        const arrowB = new THREE.ArrowHelper(vB.clone().normalize(), new THREE.Vector3(0,0,0), vB.length(), 0xef4444);
        const arrowR = new THREE.ArrowHelper(vA.clone().add(vB).normalize(), new THREE.Vector3(0,0,0), vA.clone().add(vB).length(), 0x22c55e);
        
        scene.add(arrowA, arrowB, arrowR);

        // Dashed lines for parallelogram
        const dashMaterial = new THREE.LineDashedMaterial({ color: 0x71717a, dashSize: 0.2, gapSize: 0.1 });
        const line1Geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const line2Geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const dashed1 = new THREE.Line(line1Geo, dashMaterial);
        const dashed2 = new THREE.Line(line2Geo, dashMaterial);
        scene.add(dashed1, dashed2);

        function updateVectors() {
            vA.set(parseFloat(document.getElementById('ax').value), parseFloat(document.getElementById('ay').value), parseFloat(document.getElementById('az').value));
            vB.set(parseFloat(document.getElementById('bx').value), parseFloat(document.getElementById('by').value), parseFloat(document.getElementById('bz').value));
            
            arrowA.setDirection(vA.clone().normalize());
            arrowA.setLength(vA.length() || 0.001);

            arrowB.setDirection(vB.clone().normalize());
            arrowB.setLength(vB.length() || 0.001);

            const vR = vA.clone().add(vB);
            arrowR.setDirection(vR.clone().normalize());
            arrowR.setLength(vR.length() || 0.001);

            // Update dashed lines
            dashed1.geometry.setFromPoints([vA, vR]);
            dashed1.computeLineDistances();
            dashed2.geometry.setFromPoints([vB, vR]);
            dashed2.computeLineDistances();

            document.getElementById('mag-result').innerText = vR.length().toFixed(2);
        }

        ['ax','ay','az','bx','by','bz'].forEach(id => document.getElementById(id).addEventListener('input', updateVectors));
        updateVectors();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
