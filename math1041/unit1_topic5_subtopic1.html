<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lines in 3D</title>
<style>
:root {
  --notion-bg-main: #FFFFFF;
  --notion-bg-sidebar: #F7F7F5;
  --notion-hover-sidebar: #EFEFEE;
  --notion-hover-main: #F1F1EF;
  --notion-text-primary: #37352F;
  --notion-text-secondary: #787774;
  --notion-text-placeholder: #9A9A97;
  --notion-border: #E9E9E7;
}
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: var(--notion-bg-main); color: var(--notion-text-primary); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.container { width: 100%; max-width: 600px; padding: 20px; border: 1px solid var(--notion-border); border-radius: 8px; background: var(--notion-bg-sidebar); }
.prediction { background: var(--notion-hover-main); padding: 12px; border-radius: 4px; border-left: 4px solid var(--notion-text-placeholder); margin-bottom: 20px; font-size: 14px; }
canvas { background: var(--notion-bg-main); border: 1px solid var(--notion-border); border-radius: 4px; width: 100%; cursor: move; display: block; }
.info { margin-top: 15px; padding: 15px; background: var(--notion-bg-main); border-radius: 4px; border: 1px solid var(--notion-border); font-family: monospace; font-size: 14px; }
input[type=range] { width: 100%; }
.controls { margin-top: 15px; display: flex; flex-direction: column; gap: 8px;}
</style>
</head>
<body>
<div class="container">
  <div class="prediction">
    <strong>Prediction Prompt:</strong> A line is parameterized as r(t) = r₀ + tL. What will happen to the point on the line as `t` becomes negative?
  </div>
  <canvas id="simCanvas" width="560" height="400"></canvas>
  <div class="controls">
    <label>Parameter <strong>t</strong>: <span id="tVal">1.0</span> <input type="range" id="tSlider" min="-3" max="3" step="0.1" value="1"></label>
  </div>
  <div class="info" id="infoBox">Loading...</div>
</div>
<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
let width = canvas.width; let height = canvas.height;
let dpr = window.devicePixelRatio || 1;
canvas.width = width * dpr; canvas.height = height * dpr;
ctx.scale(dpr, dpr);

let rotX = 0.4, rotY = -0.6;
let isDragging = false, lastX, lastY;

const tSlider = document.getElementById('tSlider');

function project(x, y, z) {
    let cy = Math.cos(rotY), sy = Math.sin(rotY);
    let x1 = x * cy + z * sy;
    let z1 = -x * sy + z * cy;
    let cx = Math.cos(rotX), sx = Math.sin(rotX);
    let y2 = y * cx - z1 * sx;
    let z2 = y * sx + z1 * cx;
    let scale = 60;
    return { x: x1 * scale + width/2, y: -y2 * scale + height/2, z: z2 };
}

function drawLine(p1, p2, color, thickness=2, arrow=false) {
    let pr1 = project(p1.x, p1.y, p1.z);
    let pr2 = project(p2.x, p2.y, p2.z);
    ctx.beginPath();
    ctx.moveTo(pr1.x, pr1.y);
    ctx.lineTo(pr2.x, pr2.y);
    ctx.strokeStyle = color;
    ctx.lineWidth = thickness;
    ctx.stroke();
    
    if(arrow) {
        let angle = Math.atan2(pr2.y - pr1.y, pr2.x - pr1.x);
        ctx.beginPath();
        ctx.moveTo(pr2.x, pr2.y);
        ctx.lineTo(pr2.x - 10 * Math.cos(angle - Math.PI / 6), pr2.y - 10 * Math.sin(angle - Math.PI / 6));
        ctx.lineTo(pr2.x - 10 * Math.cos(angle + Math.PI / 6), pr2.y - 10 * Math.sin(angle + Math.PI / 6));
        ctx.lineTo(pr2.x, pr2.y);
        ctx.fillStyle = color;
        ctx.fill();
    }
}

function render() {
    ctx.clearRect(0, 0, width, height);
    
    // Axes
    drawLine({x:0, y:0, z:0}, {x:3, y:0, z:0}, 'var(--notion-text-placeholder)', 1);
    drawLine({x:0, y:0, z:0}, {x:0, y:3, z:0}, 'var(--notion-text-placeholder)', 1);
    drawLine({x:0, y:0, z:0}, {x:0, y:0, z:3}, 'var(--notion-text-placeholder)', 1);
    
    let r0 = { x: 1, y: 1, z: 0.5 }; // Initial point
    let L  = { x: 0.5, y: 0.5, z: 1.0 }; // Direction vector
    
    // Draw infinite line (dashed)
    let pMin = { x: r0.x - 5*L.x, y: r0.y - 5*L.y, z: r0.z - 5*L.z };
    let pMax = { x: r0.x + 5*L.x, y: r0.y + 5*L.y, z: r0.z + 5*L.z };
    ctx.setLineDash([5, 5]);
    drawLine(pMin, pMax, 'var(--notion-border)', 2);
    ctx.setLineDash([]);
    
    // Draw r0
    drawLine({x:0,y:0,z:0}, r0, '#3182ce', 2, true);
    
    let t = parseFloat(tSlider.value);
    document.getElementById('tVal').innerText = t.toFixed(1);
    
    let r = { x: r0.x + t*L.x, y: r0.y + t*L.y, z: r0.z + t*L.z };
    
    // Draw L scaled by t
    drawLine(r0, r, '#38a169', 3, true);
    
    // Draw Resultant r
    drawLine({x:0,y:0,z:0}, r, '#e53e3e', 3, true);
    
    let pr0 = project(r0.x, r0.y, r0.z);
    ctx.fillStyle = '#3182ce'; ctx.font="14px Arial"; ctx.fillText('r₀', pr0.x+10, pr0.y);
    
    let prR = project(r.x, r.y, r.z);
    ctx.fillStyle = '#e53e3e'; ctx.fillText('r(t)', prR.x+10, prR.y);
    
    document.getElementById('infoBox').innerHTML = 
        `r₀ = (${r0.x.toFixed(1)}, ${r0.y.toFixed(1)}, ${r0.z.toFixed(1)})<br>` +
        `L = (${L.x.toFixed(1)}, ${L.y.toFixed(1)}, ${L.z.toFixed(1)})<br>` +
        `<strong>r(t) = r₀ + tL = (${r.x.toFixed(1)}, ${r.y.toFixed(1)}, ${r.z.toFixed(1)})</strong>`;
}

canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
document.addEventListener('mouseup', () => isDragging = false);
document.addEventListener('mousemove', e => {
    if(!isDragging) return;
    let dx = e.clientX - lastX;
    let dy = e.clientY - lastY;
    rotY += dx * 0.01; rotX += dy * 0.01;
    lastX = e.clientX; lastY = e.clientY;
    render();
});
tSlider.addEventListener('input', render);

render();
</script>
</body>
</html>
