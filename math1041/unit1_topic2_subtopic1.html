<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vector Equivalence</title>
<style>
:root {
  --notion-bg-main: #FFFFFF;
  --notion-bg-sidebar: #F7F7F5;
  --notion-hover-sidebar: #EFEFEE;
  --notion-hover-main: #F1F1EF;
  --notion-text-primary: #37352F;
  --notion-text-secondary: #787774;
  --notion-text-placeholder: #9A9A97;
  --notion-border: #E9E9E7;
}
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: var(--notion-bg-main); color: var(--notion-text-primary); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.container { width: 100%; max-width: 600px; padding: 20px; border: 1px solid var(--notion-border); border-radius: 8px; background: var(--notion-bg-sidebar); }
.prediction { background: var(--notion-hover-main); padding: 12px; border-radius: 4px; border-left: 4px solid var(--notion-text-placeholder); margin-bottom: 20px; font-size: 14px; }
canvas { background: var(--notion-bg-main); border: 1px solid var(--notion-border); border-radius: 4px; width: 100%; cursor: crosshair; display: block; }
.info { margin-top: 15px; padding: 15px; background: var(--notion-bg-main); border-radius: 4px; border: 1px solid var(--notion-border); font-family: monospace; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <div class="prediction">
    <strong>Prediction Prompt:</strong> A vector is defined solely by its magnitude and direction, not its starting position. What happens to the "Equivalent Vector at Origin" if you drag the middle of the red vector without altering its length or angle?
  </div>
  <canvas id="simCanvas" width="560" height="400"></canvas>
  <div class="info" id="infoBox">Loading...</div>
</div>
<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
let width = canvas.width;
let height = canvas.height;
let dpr = window.devicePixelRatio || 1;
canvas.width = width * dpr;
canvas.height = height * dpr;
ctx.scale(dpr, dpr);

const origin = { x: width/4, y: height/2 };
let tail = { x: 200, y: 150 };
let head = { x: 300, y: 50 };
let dragging = null;
let offset = {x: 0, y: 0};

function drawArrow(x1, y1, x2, y2, color, label) {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.stroke();
    
    const angle = Math.atan2(y2 - y1, x2 - x1);
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - 12 * Math.cos(angle - Math.PI / 6), y2 - 12 * Math.sin(angle - Math.PI / 6));
    ctx.lineTo(x2 - 12 * Math.cos(angle + Math.PI / 6), y2 - 12 * Math.sin(angle + Math.PI / 6));
    ctx.lineTo(x2, y2);
    ctx.fillStyle = color;
    ctx.fill();

    ctx.fillStyle = color;
    ctx.font = 'bold 14px Arial';
    ctx.fillText(label, x2 + 10, y2 + 10);
}

function drawGrid() {
    ctx.clearRect(0, 0, width, height);
    ctx.strokeStyle = 'var(--notion-border)';
    ctx.lineWidth = 1;
    for(let i=0; i<width; i+=20) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,height); ctx.stroke(); }
    for(let i=0; i<height; i+=20) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(width,i); ctx.stroke(); }
    ctx.strokeStyle = 'var(--notion-text-placeholder)';
    ctx.beginPath(); ctx.moveTo(origin.x, 0); ctx.lineTo(origin.x, height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, origin.y); ctx.lineTo(width, origin.y); ctx.stroke();
}

function render() {
    drawGrid();
    
    // Draw original vector
    drawArrow(tail.x, tail.y, head.x, head.y, '#e53e3e', 'v');
    
    // Handles
    ctx.fillStyle = '#ecc94b'; ctx.beginPath(); ctx.arc(tail.x, tail.y, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ecc94b'; ctx.beginPath(); ctx.arc(head.x, head.y, 6, 0, Math.PI*2); ctx.fill();
    
    // Draw equivalent vector at origin
    let dx = head.x - tail.x;
    let dy = head.y - tail.y;
    drawArrow(origin.x, origin.y, origin.x + dx, origin.y + dy, '#3182ce', 'v (origin)');
    
    document.getElementById('infoBox').innerHTML = 
        `Vector = (${(dx/20).toFixed(1)}, ${(-dy/20).toFixed(1)})<br>` +
        `Length = ${(Math.hypot(dx, dy)/20).toFixed(2)}`;
}

function distToSegmentSquared(p, v, w) {
  let l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
  if (l2 === 0) return Math.pow(p.x - v.x, 2) + Math.pow(p.y - v.y, 2);
  let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
  t = Math.max(0, Math.min(1, t));
  return Math.pow(p.x - (v.x + t * (w.x - v.x)), 2) + Math.pow(p.y - (v.y + t * (w.y - v.y)), 2);
}

canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width / dpr);
    const my = (e.clientY - rect.top) * (canvas.height / rect.height / dpr);
    
    if (Math.hypot(mx - tail.x, my - tail.y) < 20) dragging = 'tail';
    else if (Math.hypot(mx - head.x, my - head.y) < 20) dragging = 'head';
    else if (distToSegmentSquared({x:mx, y:my}, tail, head) < 100) {
        dragging = 'both';
        offset = { x: mx - tail.x, y: my - tail.y };
    }
});
canvas.addEventListener('mousemove', e => {
    if(!dragging) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width / dpr);
    const my = (e.clientY - rect.top) * (canvas.height / rect.height / dpr);
    
    if(dragging === 'tail') { tail.x = mx; tail.y = my; }
    else if(dragging === 'head') { head.x = mx; head.y = my; }
    else if(dragging === 'both') {
       let dx = head.x - tail.x;
       let dy = head.y - tail.y;
       tail.x = mx - offset.x; 
       tail.y = my - offset.y;
       head.x = tail.x + dx;
       head.y = tail.y + dy;
    }
    render();
});
canvas.addEventListener('mouseup', () => dragging = null);
canvas.addEventListener('mouseleave', () => dragging = null);
render();
</script>
</body>
</html>
