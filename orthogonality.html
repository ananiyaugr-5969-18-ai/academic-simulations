<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation: Dot Product and Orthogonality</title>
    <style>
        :root {
            --notion-bg-main: #FFFFFF;
            --notion-bg-sidebar: #F7F7F5;
            --notion-hover-sidebar: #EFEFEE;
            --notion-hover-main: #F1F1EF;
            --notion-text-primary: #37352F;
            --notion-text-secondary: #787774;
            --notion-text-placeholder: #9A9A97;
            --notion-border: #E9E9E7;
            --notion-blue: #337EA9;
            --notion-purple: #9065B0;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
            background-color: var(--notion-bg-main);
            color: var(--notion-text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--notion-bg-sidebar);
            border: 1px solid var(--notion-border);
            border-radius: 8px;
            padding: 20px;
        }

        .prediction-prompt {
            background: var(--notion-hover-main);
            border-left: 4px solid var(--notion-purple);
            color: var(--notion-text-primary);
            font-weight: 500;
        }

        canvas {
            background: white;
            border: 1px solid var(--notion-border);
            border-radius: 4px;
            width: 100%;
            height: auto;
            cursor: crosshair;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.9rem;
            color: var(--notion-text-secondary);
        }

        .stats {
            margin-top: 10px;
            font-family: monospace;
            font-size: 0.9rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .vector-label { font-weight: bold; }
        .blue { color: var(--notion-blue); }
        .purple { color: var(--notion-purple); }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .orthogonal { background: #E1F0E5; color: #377E47; }
        .acute { background: #E1F0F0; color: #337EA9; }
        .obtuse { background: #FDEBEC; color: #EB5757; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card prediction-prompt">
            💡 <strong>Prediction Prompt:</strong> What do you predict happens to the <strong>Dot Product</strong> as the angle between the vectors becomes exactly 90°?
        </div>

        <div class="card">
            <canvas id="dotCanvas" width="800" height="500"></canvas>
            
            <div class="stats">
                <div>
                    <span class="vector-label blue">Vector a:</span> <span id="valA">(4, 3)</span><br>
                    <span class="vector-label purple">Vector b:</span> <span id="valB">(2, -4)</span>
                </div>
                <div>
                    <span class="vector-label">Dot Product (a·b):</span> <span id="valDot">-4.0</span><br>
                    <span class="vector-label">Relationship:</span> <span id="status" class="status-badge obtuse">Obtuse</span>
                </div>
            </div>

            <div class="controls">
                <div class="control-group">
                    <label>a.x: <span id="axLabel">4</span></label>
                    <input type="range" id="ax" min="-10" max="10" step="0.5" value="4">
                </div>
                <div class="control-group">
                    <label>a.y: <span id="ayLabel">3</span></label>
                    <input type="range" id="ay" min="-10" max="10" step="0.5" value="3">
                </div>
                <div class="control-group">
                    <label>b.x: <span id="bxLabel">2</span></label>
                    <input type="range" id="bx" min="-10" max="10" step="0.5" value="2">
                </div>
                <div class="control-group">
                    <label>b.y: <span id="byLabel">-4</span></label>
                    <input type="range" id="by" min="-10" max="10" step="0.5" value="-4">
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('dotCanvas');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        
        const width = 800;
        const height = 500;
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        canvas.width = width * dpr;
        canvas.height = height * dpr;
        ctx.scale(dpr, dpr);

        const gridSize = 40;
        const origin = { x: width / 2, y: height / 2 };

        const inputs = {
            ax: document.getElementById('ax'),
            ay: document.getElementById('ay'),
            bx: document.getElementById('bx'),
            by: document.getElementById('by')
        };

        const labels = {
            ax: document.getElementById('axLabel'), ay: document.getElementById('ayLabel'),
            bx: document.getElementById('bxLabel'), by: document.getElementById('byLabel'),
            valA: document.getElementById('valA'), valB: document.getElementById('valB'),
            valDot: document.getElementById('valDot'), status: document.getElementById('status')
        };

        function drawGrid() {
            ctx.strokeStyle = '#E9E9E7'; ctx.lineWidth = 1;
            for (let x = 0; x <= width; x += gridSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke(); }
            for (let y = 0; y <= height; y += gridSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke(); }
            ctx.strokeStyle = '#37352F'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, origin.y); ctx.lineTo(width, origin.y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(origin.x, 0); ctx.lineTo(origin.x, height); ctx.stroke();
        }

        function drawVector(x, y, color, label) {
            const endX = origin.x + x * gridSize;
            const endY = origin.y - y * gridSize;
            ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(origin.x, origin.y); ctx.lineTo(endX, endY); ctx.stroke();
            const angle = Math.atan2(origin.y - endY, origin.x - endX);
            ctx.beginPath(); ctx.moveTo(endX, endY); ctx.lineTo(endX + 15 * Math.cos(angle - Math.PI/6), endY + 15 * Math.sin(angle - Math.PI/6)); ctx.lineTo(endX + 15 * Math.cos(angle + Math.PI/6), endY + 15 * Math.sin(angle + Math.PI/6)); ctx.closePath();
            ctx.fillStyle = color; ctx.fill(); ctx.font = 'bold 16px sans-serif'; ctx.fillText(label, endX + 10, endY - 10); ctx.restore();
        }

        function update() {
            const ax = parseFloat(inputs.ax.value); const ay = parseFloat(inputs.ay.value);
            const bx = parseFloat(inputs.bx.value); const by = parseFloat(inputs.by.value);
            const dot = ax * bx + ay * by;
            
            labels.ax.textContent = ax; labels.ay.textContent = ay;
            labels.bx.textContent = bx; labels.by.textContent = by;
            labels.valA.textContent = `(${ax}, ${ay})`; labels.valB.textContent = `(${bx}, ${by})`;
            labels.valDot.textContent = dot.toFixed(1);

            const status = labels.status;
            status.className = 'status-badge';
            if (Math.abs(dot) < 0.1) { status.textContent = 'Orthogonal (90°)'; status.classList.add('orthogonal'); }
            else if (dot > 0) { status.textContent = 'Acute (< 90°)'; status.classList.add('acute'); }
            else { status.textContent = 'Obtuse (> 90°)'; status.classList.add('obtuse'); }

            ctx.clearRect(0, 0, width, height);
            drawGrid();
            drawVector(ax, ay, '#337EA9', 'a');
            drawVector(bx, by, '#9065B0', 'b');
        }

        Object.values(inputs).forEach(input => input.addEventListener('input', update));
        update();
    </script>
</body>
</html>
